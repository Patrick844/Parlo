services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: parlo
      POSTGRES_PASSWORD: parlo
      POSTGRES_DB: parlo
    ports:
      # Bound to localhost only, on 5433 so it never clashes with a local Postgres.
      - "127.0.0.1:5433:5432"
    volumes:
      - parlo_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parlo"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8200:8000"
    environment:
      # Prod sets DATABASE_URL to the managed Neon URL; local dev falls back to the db container.
      DATABASE_URL: ${DATABASE_URL:-postgresql://parlo:parlo@db:5432/parlo}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SECRET_KEY: ${SECRET_KEY}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3200}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8200}
        VITE_POSTHOG_KEY: ${VITE_POSTHOG_KEY:-}
        VITE_POSTHOG_HOST: ${VITE_POSTHOG_HOST:-https://eu.i.posthog.com}
    ports:
      - "3200:80"
    depends_on:
      - backend

volumes:
  parlo_pgdata:
